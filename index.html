<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #ff6b6b;
            --cell-size: 100px;
            --border-color: #333;
            --text-color: #333;
            --bg-color: #f8f9fa;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }
        
        .game-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .game-info {
            margin: 20px 0;
            padding: 15px;
            background-color: #f0f4f8;
            border-radius: 8px;
        }
        
        .player-turn {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--secondary-color);
        }
        
        .game-status {
            font-size: 1.1rem;
            min-height: 24px;
            color: var(--text-color);
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin: 30px auto;
            max-width: calc(var(--cell-size) * 3 + 20px);
        }
        
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: white;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .cell:hover {
            background-color: #f0f4f8;
            transform: scale(1.05);
        }
        
        .cell.x {
            color: var(--primary-color);
        }
        
        .cell.o {
            color: var(--accent-color);
        }
        
        .cell.winning-cell {
            background-color: #e8f5e8;
            border-color: #4caf50;
        }
        
        .controls {
            margin-top: 25px;
        }
        
        .restart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        
        .restart-btn:hover {
            background-color: var(--secondary-color);
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f4f8;
            border-radius: 8px;
        }
        
        .score-item {
            text-align: center;
        }
        
        .score-label {
            font-size: 0.9rem;
            color: #666;
        }
        
        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        @media (max-width: 600px) {
            :root {
                --cell-size: 80px;
            }
            
            .game-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        
        <div class="game-info">
            <div class="player-turn" id="player-turn">Player X's Turn</div>
            <div class="game-status" id="game-status">Game in progress</div>
        </div>
        
        <div class="game-board" id="game-board">
            <!-- Game cells will be generated by JavaScript -->
        </div>
        
        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Player X</div>
                <div class="score-value" id="score-x">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Draws</div>
                <div class="score-value" id="score-draw">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">Player O</div>
                <div class="score-value" id="score-o">0</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="restart-btn" id="restart-btn">Restart Game</button>
        </div>
    </div>

    <script>
        // Game state variables
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let scores = {
            'X': 0,
            'O': 0,
            'draw': 0
        };
        
        // Winning combinations
        const winningCombinations = [
            [0, 1, 2], // Top row
            [3, 4, 5], // Middle row
            [6, 7, 8], // Bottom row
            [0, 3, 6], // Left column
            [1, 4, 7], // Middle column
            [2, 5, 8], // Right column
            [0, 4, 8], // Diagonal top-left to bottom-right
            [2, 4, 6]  // Diagonal top-right to bottom-left
        ];
        
        // DOM elements
        const gameBoardElement = document.getElementById('game-board');
        const playerTurnElement = document.getElementById('player-turn');
        const gameStatusElement = document.getElementById('game-status');
        const restartButton = document.getElementById('restart-btn');
        const scoreXElement = document.getElementById('score-x');
        const scoreOElement = document.getElementById('score-o');
        const scoreDrawElement = document.getElementById('score-draw');
        
        // Initialize the game board
        function initializeBoard() {
            gameBoardElement.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', () => handleCellClick(i));
                gameBoardElement.appendChild(cell);
            }
        }
        
        // Handle cell click
        function handleCellClick(index) {
            // Check if cell is empty and game is active
            if (gameBoard[index] !== '' || !gameActive) {
                return;
            }
            
            // Update game board array
            gameBoard[index] = currentPlayer;
            
            // Update UI
            const cellElement = document.querySelector(`.cell[data-index="${index}"]`);
            cellElement.textContent = currentPlayer;
            cellElement.classList.add(currentPlayer.toLowerCase());
            
            // Check for win or draw
            checkGameResult();
            
            // Switch player if game is still active
            if (gameActive) {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updatePlayerTurn();
            }
        }
        
        // Check for win or draw
        function checkGameResult() {
            let roundWon = false;
            let winningCells = [];
            
            // Check all winning combinations
            for (let i = 0; i < winningCombinations.length; i++) {
                const [a, b, c] = winningCombinations[i];
                
                if (
                    gameBoard[a] && 
                    gameBoard[a] === gameBoard[b] && 
                    gameBoard[a] === gameBoard[c]
                ) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }
            
            if (roundWon) {
                // Highlight winning cells
                winningCells.forEach(index => {
                    const cellElement = document.querySelector(`.cell[data-index="${index}"]`);
                    cellElement.classList.add('winning-cell');
                });
                
                // Update game status
                gameStatusElement.textContent = `Player ${currentPlayer} wins!`;
                gameActive = false;
                
                // Update scores
                scores[currentPlayer]++;
                updateScoreDisplay();
                
                return;
            }
            
            // Check for draw
            const roundDraw = !gameBoard.includes('');
            if (roundDraw) {
                gameStatusElement.textContent = "Game ended in a draw!";
                gameActive = false;
                
                // Update scores
                scores['draw']++;
                updateScoreDisplay();
                
                return;
            }
        }
        
        // Update player turn display
        function updatePlayerTurn() {
            playerTurnElement.textContent = `Player ${currentPlayer}'s Turn`;
            
            // Update color based on player
            if (currentPlayer === 'X') {
                playerTurnElement.style.color = '#4a6fa5';
            } else {
                playerTurnElement.style.color = '#ff6b6b';
            }
        }
        
        // Update score display
        function updateScoreDisplay() {
            scoreXElement.textContent = scores['X'];
            scoreOElement.textContent = scores['O'];
            scoreDrawElement.textContent = scores['draw'];
        }
        
        // Restart game (reset board but keep scores)
        function restartGame() {
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            
            // Reset UI
            initializeBoard();
            updatePlayerTurn();
            gameStatusElement.textContent = 'Game in progress';
        }
        
        // Initialize game
        function initGame() {
            initializeBoard();
            updatePlayerTurn();
            updateScoreDisplay();
            
            // Add event listener to restart button
            restartButton.addEventListener('click', restartGame);
        }
        
        // Start the game when page loads
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
